version: '3.8'

services:
  dylan:
    build: .
    container_name: dylan
    restart: unless-stopped
    cap_add:
      - NET_RAW
    ports:
      - "8080:80"

    # Volume mounts override the baked-in code from the image.
    # After a git pull, a container restart picks up all changes — no rebuild needed.
    # Only add/remove gems (Gemfile) requires a new image build.
    volumes:
      - ./server.rb:/app/server.rb:ro
      - ./lib:/app/lib:ro
      - ./plugins:/app/plugins:ro
      - ./scripts:/app/scripts:ro
      - ./config:/app/config:ro
      - ./data:/app/data:rw

    environment:
      - PORT=80
      - RUBY_ENV=production
      - TZ=Europe/Berlin
