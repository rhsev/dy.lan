<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="5">
  <title>Dylan Stats</title>
  <link rel="stylesheet" href="/dylan/assets/style.css">
</head>
<body>
  <div class="container">
    <h1>Server Statistics</h1>
    <a class="back-link" href="/dylan">← Back to Dashboard</a>

    {{DISABLED_WARNING}}

    <div class="metric">
      <strong>{{UPTIME_HUMAN}}</strong><br>
      Uptime
    </div>

    <div class="metric">
      <strong>{{TOTAL_REQUESTS}}</strong><br>
      Total Requests
    </div>

    <div class="metric">
      <strong>{{PLUGIN_COUNT}}</strong><br>
      Registered Plugins
    </div>

    <h3>Requests by Plugin</h3>
    <table>
      <tr><th>Plugin</th><th>Requests</th></tr>
{{PLUGIN_ROWS}}
    </table>

    <p class="refresh-hint">
      Started: {{STARTED_AT}}<br>
      Auto-refresh: 5 seconds
    </p>
  </div>
</body>
</html>
